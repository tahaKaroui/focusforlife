# FocusForLife Unbound config (template)
# This is a template; final paths will be aligned with install plan.

server:
  interface: 127.0.0.1
  port: 5335
  access-control: 127.0.0.0/8 allow

  # Blocklist managed by daemon
  # local-zone entries or local-data entries will be generated here
  include: "focusforlife-blocklist.conf"

# Optional: block page IP (if used)
# local-data: "blocked.example.com A 127.0.0.1"
