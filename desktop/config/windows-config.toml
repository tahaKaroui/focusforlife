[rules]
daily_quota_minutes = 60
hourly_limit_minutes = 10
activity_grace_seconds = 30

[windows.hard_block]
start = "23:30"
end = "11:00"

[windows.free_time_evening]
start = "21:00"
end = "23:30"

[windows.free_time_break]
start = "15:00"
end = "16:00"

[prompts]
free_time_evening_prompt = "default_yes"
free_time_break_prompt = "default_yes"
prompt_timeout_seconds = 60

# Cross-device sync via Firebase Realtime Database. Leave the fields below empty
# to run standalone (no sync). To enable, copy this file to e.g.
# config/windows.local.toml (gitignored), fill in the values, and run the daemon
# with `--config config/windows.local.toml`. See docs/firebase-setup.md.
[sync]
firebase_db_url = ""
firebase_api_key = ""
firebase_email = ""
firebase_password = ""
device_id = "windows"
sync_interval_seconds = 10

[logging]
level = "info"
